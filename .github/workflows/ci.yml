name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The build toolchain is JDK 25 (it compiles the release-21 baseline AND
      # the release-22 multi-release shared-memory overlay). The Java 21 test
      # lane proves the library runs on a real 21 runtime with shm disabled
      # (FFM unavailable -> pipe transport). Install both; Gradle's toolchain
      # detection picks them up from the JAVA_HOME_*_X64 env vars setup-java
      # exports (this repo has no foojay resolver, so it cannot auto-download).
      # Listing 21 last makes it JAVA_HOME, so the Gradle launcher itself runs
      # on 21 while the 25 toolchain is used for compilation.
      - name: Set up JDKs 25 + 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            25
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Test on JDK 25 (core + FFM shared-memory overlay)
        run: >-
          ./gradlew --no-daemon
          -Porg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64
          :vgirpc:test :vgirpc:java22Test

      - name: Test on JDK 21 (core; shm disabled, pipe fallback)
        run: >-
          ./gradlew --no-daemon --rerun-tasks
          -Porg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64
          -PtestJdk=21 :vgirpc:test

  # Python-driven conformance suite: a Python driver (the vgi_rpc reference)
  # spawns the Java worker and asserts byte-for-byte wire compatibility. Fanned
  # out across transport groups so the lanes run in parallel and failures
  # isolate by mode. The launcher lanes split by runtime JDK because shm has no
  # disable switch — it is gated purely by ShmFactory.available() (true on JDK
  # >= 22 via the multi-release overlay, false on 21):
  #   * launcher @ JDK 21 -> shm unavailable, pure pipe/unix wire
  #   * launcher @ JDK 25 -> shm side-channel active (+ zero-copy resolve)
  #   * http     @ JDK 25 -> HTTP transport (shm not involved)
  conformance:
    name: conformance / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: launcher (JDK 21, no shm)
            run_jdk: '21'
            transports: pipe,subprocess,unix
            zerocopy: ''
          - name: launcher + shm (JDK 25)
            run_jdk: '25'
            transports: pipe,subprocess,unix
            zerocopy: '1'
          - name: http (JDK 25)
            run_jdk: '25'
            transports: http,http_externalize_always
            zerocopy: ''
    steps:
      - uses: actions/checkout@v4

      # Always install both JDKs: 25 is the build toolchain (it compiles
      # vgirpc's release-22 shared-memory overlay), while the worker is *run* on
      # matrix.run_jdk. setup-java exports JAVA_HOME_{21,25}_X64 for both.
      - name: Set up JDKs 25 + 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            25
            21

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # The Java worker tracks the *unreleased* Python reference (0.19.0+ on
      # main), which is ahead of PyPI's latest — so install vgi_rpc from source
      # off the default branch rather than `pip install vgi-rpc`.
      - name: Clone vgi-rpc-python reference
        run: git clone --depth 1 https://github.com/Query-farm/vgi-rpc-python.git "$RUNNER_TEMP/vgi-rpc-python"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "${RUNNER_TEMP}/vgi-rpc-python[http,cli,external,conformance,oauth,mtls]" pytest pytest-timeout

      - name: Build conformance worker (toolchain JDK 25)
        run: >-
          ./gradlew --no-daemon
          -Porg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64
          :conformance-worker:installDist

      - name: Run conformance suite (${{ matrix.transports }} on JDK ${{ matrix.run_jdk }})
        env:
          CONFORMANCE_TRANSPORTS: ${{ matrix.transports }}
          VGI_RPC_SHM_ZEROCOPY: ${{ matrix.zerocopy }}
        run: |
          # The worker launch script honors JAVA_HOME; point it at the run-JDK.
          if [ "${{ matrix.run_jdk }}" = "21" ]; then
            export JAVA_HOME="$JAVA_HOME_21_X64"
          else
            export JAVA_HOME="$JAVA_HOME_25_X64"
          fi
          echo "worker JAVA_HOME=$JAVA_HOME"
          python -m pytest tests/test_java_conformance.py -p no:cacheprovider -q --timeout=120
